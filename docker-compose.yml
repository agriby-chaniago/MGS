version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: modelgate
      POSTGRES_USER: modelgate
      POSTGRES_PASSWORD: modelgate_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelgate"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  dataset_service:
    build: ./dataset_service
    ports:
      - "8001:8001"
    env_file: .env.example
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  audit_service:
    build: ./audit_service
    ports:
      - "8002:8002"
    env_file: .env.example
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  analysis_service:
    build: ./analysis_service
    ports:
      - "8003:8003"
    env_file: .env.example
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  report_service:
    build: ./report_service
    ports:
      - "8004:8004"
    env_file: .env.example
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - dataset_service
      - audit_service
      - analysis_service
      - report_service

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
