version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: modelgate
      POSTGRES_USER: modelgate
      POSTGRES_PASSWORD: modelgate_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U modelgate"]
      interval: 5s
      timeout: 5s
      retries: 10

  rabbitmq:
    build: ./rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
      - "15692:15692"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 5s
      retries: 10

  dataset_service:
    build: ./dataset_service
    # No fixed host port — reached only via Nginx (auth_request gate),
    # never directly. A fixed host port would let anyone bypass the whole
    # auth gateway by self-supplying X-User-Id/X-User-Plan headers, since
    # this service has no way to verify those headers actually came from
    # Nginx. Same rationale as analysis_service's port removal (scaling).
    expose:
      - "8001"
    env_file: .env.example
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy

  audit_service:
    build: ./audit_service
    # No fixed host port — see dataset_service comment above.
    expose:
      - "8002"
    env_file: .env.example
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy

  analysis_service:
    build: ./analysis_service
    # No fixed host port: this service is only ever reached via Nginx's
    # internal DNS (analysis_service:8003), never directly from the host.
    # A fixed "8003:8003" mapping would collide when scaled to >1 replica
    # (`docker compose up -d --scale analysis_service=3`); closing the host
    # port also removes a Nginx-bypass path once auth is enforced.
    expose:
      - "8003"
    env_file: .env.example
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      minio:
        condition: service_healthy

  report_service:
    build: ./report_service
    # No fixed host port — see dataset_service comment above.
    expose:
      - "8004"
    env_file: .env.example
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy

  auth_service:
    build: ./auth_service
    ports:
      - "8005:8005"
    env_file: .env.example
    volumes:
      - ./shared:/app/shared
    environment:
      - PYTHONPATH=/app
    depends_on:
      postgres:
        condition: service_healthy

  pgadmin:
    image: dpage/pgadmin4:latest
    environment:
      PGADMIN_DEFAULT_EMAIL: agrieby.chaniago@student.uhb.ac.id
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      postgres:
        condition: service_healthy

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docs:/usr/share/nginx/html/docs:ro
    depends_on:
      - dataset_service
      - audit_service
      - analysis_service
      - report_service
      - auth_service

  streamlit:
    build: ./streamlit_app
    ports:
      - "8501:8501"
    environment:
      - API_BASE_URL=http://nginx:80
    depends_on:
      - nginx

  frontend:
    build:
      context: ./frontend
      args:
        # Vite bakes this in at build time (see frontend/Dockerfile) — it
        # must be the browser-reachable gateway URL, not the internal
        # nginx:80 hostname Streamlit uses server-side, since this runs in
        # the user's browser, not inside the Docker network.
        VITE_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:80"
    depends_on:
      - nginx

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./observability/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    depends_on:
      - dataset_service
      - audit_service
      - analysis_service
      - report_service
      - auth_service

  grafana:
    image: grafana/grafana:latest
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - grafana_data:/var/lib/grafana
      - ./observability/grafana-datasource.yml:/etc/grafana/provisioning/datasources/prometheus.yml:ro
    ports:
      # Container's own default (3000) remapped to avoid colliding with
      # the frontend service's host port 3000.
      - "3001:3000"
    depends_on:
      - prometheus

volumes:
  postgres_data:
  rabbitmq_data:
  minio_data:
  prometheus_data:
  grafana_data:
