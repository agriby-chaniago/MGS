events {
    worker_connections 1024;
}

http {
    client_max_body_size 2048M;

    upstream dataset_service {
        server dataset_service:8001;
    }

    upstream audit_service {
        server audit_service:8002;
    }

    upstream analysis_service {
        server analysis_service:8003;
    }

    upstream report_service {
        server report_service:8004;
    }

    server {
        listen 80;

        location /api/v1/datasets {
            proxy_pass http://dataset_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location /api/v1/datasets/ {
            proxy_pass http://dataset_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_read_timeout 300s;
        }

        location /api/v1/audits {
            proxy_pass http://audit_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/analyses {
            proxy_pass http://analysis_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location /api/v1/reports {
            proxy_pass http://report_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
