events {
    worker_connections 1024;
}

http {
    client_max_body_size 2048M;

    # Gateway-level, IP-based abuse protection (plan-aware per-minute
    # limits by tier are NOT done here — auth_request and limit_req are
    # both access-phase modules with no guaranteed relative order, so
    # $user_plan set via auth_request_set can't be reliably read by a
    # limit_req zone key. Tier-aware limiting instead lives in
    # audit_service's daily quota, a coarser but correct alternative).
    limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=general_zone:10m rate=60r/m;
    # 429 (not Nginx's default 503) — matches the status audit_service's
    # own daily-quota rejection already uses, for a consistent API surface.
    limit_req_status 429;

    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    # Reflects the request's own Origin only for known-safe local dev
    # origins (the React frontend can run on a different port than the
    # gateway) — dynamic reflection is an accepted demo-scope tradeoff,
    # see plan Workstream C.
    map $http_origin $cors_origin {
        default "";
        "~^http://localhost(:[0-9]+)?$" $http_origin;
    }

    upstream dataset_service {
        server dataset_service:8001;
    }

    upstream audit_service {
        server audit_service:8002;
    }

    upstream analysis_service {
        server analysis_service:8003;
    }

    upstream report_service {
        server report_service:8004;
    }

    upstream auth_service {
        server auth_service:8005;
    }

    server {
        listen 80;

        # --- Internal-only: the auth_request target. Not reachable from
        # outside; called as a subrequest by every gated location below. ---
        location = /internal/verify {
            internal;
            proxy_pass http://auth_service/internal/verify;
            proxy_pass_request_body off;
            proxy_set_header Content-Length "";
            # $request_uri always reflects the ORIGINAL client request URI
            # (including query string), unlike a subrequest's own args —
            # this is how the WebSocket ?token= fallback (browsers can't
            # set custom headers on a WS handshake) reaches auth_service
            # even though this location's own configured URI has none.
            proxy_set_header X-Original-URI $request_uri;
        }

        # --- CORS-on-401 fix: a 401 generated by auth_request itself does
        # NOT carry this location's add_header directives (add_header only
        # applies to a location's own successful response path) — without
        # this, a failed-auth browser request shows a generic CORS error
        # instead of a clean 401, and the frontend's interceptor never sees
        # the real status code to redirect to /login. ---
        location @handle_401 {
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;
            return 401;
        }

        # --- Public: register/login must NOT be gated by auth_request ---
        location /api/v1/auth {
            limit_req zone=auth_zone burst=5 nodelay;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
                return 204;
            }
            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            proxy_pass http://auth_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        # --- Gated: dataset_service ---
        location /api/v1/datasets {
            limit_req zone=general_zone burst=20 nodelay;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
                return 204;
            }
            auth_request /internal/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_plan $upstream_http_x_user_plan;
            error_page 401 = @handle_401;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            proxy_pass http://dataset_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Plan $user_plan;
            proxy_read_timeout 300s;
        }

        location /api/v1/datasets/ {
            limit_req zone=general_zone burst=20 nodelay;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
                return 204;
            }
            auth_request /internal/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_plan $upstream_http_x_user_plan;
            error_page 401 = @handle_401;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            proxy_pass http://dataset_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Plan $user_plan;
            proxy_read_timeout 300s;
        }

        # --- Gated: audit_service ---
        location /api/v1/audits {
            limit_req zone=general_zone burst=20 nodelay;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
                return 204;
            }
            auth_request /internal/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_plan $upstream_http_x_user_plan;
            error_page 401 = @handle_401;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            proxy_pass http://audit_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Plan $user_plan;
        }

        # --- Gated: analysis_service ---
        location /api/v1/analyses {
            limit_req zone=general_zone burst=20 nodelay;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
                return 204;
            }
            auth_request /internal/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_plan $upstream_http_x_user_plan;
            error_page 401 = @handle_401;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            proxy_pass http://analysis_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Plan $user_plan;
        }

        # --- Gated: report_service ---
        location /api/v1/reports {
            limit_req zone=general_zone burst=20 nodelay;
            if ($request_method = OPTIONS) {
                add_header Access-Control-Allow-Origin $cors_origin always;
                add_header Access-Control-Allow-Credentials true always;
                add_header Access-Control-Allow-Methods "GET, POST, DELETE, OPTIONS" always;
                add_header Access-Control-Allow-Headers "Authorization, Content-Type, X-API-Key" always;
                return 204;
            }
            auth_request /internal/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_plan $upstream_http_x_user_plan;
            error_page 401 = @handle_401;

            add_header Access-Control-Allow-Origin $cors_origin always;
            add_header Access-Control-Allow-Credentials true always;

            proxy_pass http://report_service;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Plan $user_plan;
        }

        # --- Gated: WebSocket live progress (audit_service). ---
        location /ws/ {
            auth_request /internal/verify;
            auth_request_set $user_id $upstream_http_x_user_id;
            auth_request_set $user_plan $upstream_http_x_user_plan;
            error_page 401 = @handle_401;

            proxy_pass http://audit_service;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header X-User-Id $user_id;
            proxy_set_header X-User-Plan $user_plan;
        }

        location = /docs {
            return 301 /docs/;
        }

        location /docs/ {
            alias /usr/share/nginx/html/docs/;
            try_files $uri $uri/ /docs/index.html;
        }
    }
}
