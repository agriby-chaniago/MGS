name: Build & Push Images

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        service:
          - dataset_service
          - audit_service
          - analysis_service
          - report_service
          - auth_service
          - streamlit_app
          - frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        # PRs only build (never push) to avoid flooding the registry with
        # untagged/throwaway images — only pushes to main publish.
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build args (frontend only)
        id: build_args
        run: |
          if [ "${{ matrix.service }}" = "frontend" ]; then
            echo "args=VITE_API_BASE_URL=http://localhost:8080" >> "$GITHUB_OUTPUT"
          else
            echo "args=" >> "$GITHUB_OUTPUT"
          fi

      - name: Lowercase repository owner (GHCR requires lowercase image names)
        id: owner
        run: echo "name=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./${{ matrix.service }}
          build-args: ${{ steps.build_args.outputs.args }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/modelgate-${{ matrix.service }}:latest
            ${{ env.REGISTRY }}/${{ steps.owner.outputs.name }}/modelgate-${{ matrix.service }}:${{ github.sha }}
